[package]
name = "no_std_tool"
version = "0.1.0"
edition = "2021"
description = "Common no_std boilerplate and synchronization macros"
license = "MIT"
keywords = ["no_std", "macros", "sync"]
categories = ["no-std"]

[dependencies]
lazy_static = { version = "1.4", features = ["spin_no_std"] }
rkyv = { version = "0.7", default-features = false, features = ["size_64"] }
heapless = "0.8"
no_std_tool_macros = { path = "no_std_tool_macros" }
ahash = { version = "0.8", default-features = false }
hashbrown = { version = "0.14", default-features = false, features = ["inline-more", "ahash"] }
